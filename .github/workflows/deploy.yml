name: Spring Boot CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Application
        run: mvn clean package

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: target/*.jar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/opt/springboot"

      - name: Restart Spring Boot Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /opt/springboot/logs

            echo "Stopping existing application..."
            pkill -f spring-boot-hello-world || true

            sleep 3

            echo "Finding JAR..."
            JAR=$(find /opt/springboot -name "*.jar" | head -n 1)

            echo "Starting application..."
            nohup java -jar "$JAR" > /opt/springboot/logs/app.log 2>&1 < /dev/null &

            sleep 10

            if pgrep -f "$JAR" > /dev/null; then
                echo "Application started successfully."
            else
                echo "Application failed to start."
                cat /opt/springboot/logs/app.log
                exit 1
            fi
        